<!DOCTYPE html>
<html>

<head>

    <title>Smart Building Toolkit</title>
    <meta charset="UTF-8">
    <link rel="icon" href="https://example.com/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="./index.js" defer></script>

    <style>
        html,
        body,
        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: "Raleway", sans-serif
        }
    </style>

</head>

<body class="n0-light-grey">

    <div id="smartBldgDesign">

        <!-- !PAGE CONTENT! -->
        <div class="n0-main">

            <div class="n0-container n0-padding-16">
            
                <h3><b>Attain Data Platform</b></h3>
                <h5>Management API - Explorer</h5>
            
                <!-- Search -->
                <input 
                    class="n0-input n0-border n0-round-large n0-margin-bottom"
                    placeholder="Search endpoints..."
                    v-model="search"
                />
            
                <!-- Groups -->
                <div v-for="(endpoints, group) in filteredEndpoints" :key="group" class="n0-margin-bottom">
            
                    <!-- Group Header -->
                    <div 
                        class="n0-panel n0-indigo n0-round-large n0-padding n0-hover-opacity"
                        @click="toggleGroup(group)"
                        style="cursor:pointer"
                    >
                        <b>{{ group }}</b>
                        <span class="n0-right">
                            <i class="fa" :class="openGroups[group] ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                        </span>
                    </div>
            
                    <!-- Endpoints -->
                    <div v-show="openGroups[group]" class="n0-white n0-border n0-round-large n0-padding">
            
                        <div 
                            v-for="ep in endpoints" 
                            :key="ep.method + ep.path"
                            class="n0-panel n0-border n0-round n0-margin-bottom n0-hover-shadow"
                        >
                            
                            <!-- Top Row -->
                            <div class="n0-row">
                                <div class="n0-col s2">
                                    <span 
                                        class="n0-tag"
                                        :class="methodClass(ep.method)"
                                    >
                                        {{ ep.method }}
                                    </span>
                                </div>
            
                                <div class="n0-col s8">
                                    <code class="n0-codespan">{{ ep.path }}</code>
                                </div>
            
                                <div class="n0-col s2 n0-right-align">
                                    <button 
                                        class="n0-button n0-small n0-border n0-round"
                                        @click="copy(ep.path)"
                                    >
                                        <i class="fa fa-copy"></i>
                                    </button>
                                </div>
                            </div>
            
                            <!-- Description -->
                            <div class="n0-margin-top n0-text-grey">
                                {{ ep.description }}
                            </div>
            
                        </div>
            
                    </div>
            
                </div>
            
            </div>
          
        </div>

    <!-- End page content -->
    </div>

</body>
</html>
