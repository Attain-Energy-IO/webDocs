<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Attain Developer Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css?family=Raleway" rel="stylesheet">

  <style>
    body {
      font-family: "Raleway", sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .section {
      background: white;
      border-radius: 16px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .section-header {
      padding: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #111;
      color: white;
    }

    .section-content {
      display: none;
      padding: 15px;
    }

    .endpoint {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .method {
      font-weight: bold;
      margin-right: 10px;
    }

    .GET { color: green; }
    .POST { color: blue; }

    .url {
      font-family: monospace;
      display: block;
      margin: 5px 0;
    }

    .copy-btn {
      background: #eee;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<h1>Attain Data Platform API</h1>
<input id="search" placeholder="Search endpoints...">

<div id="app"></div>

<script>
const data = [
  {
    title: "Authentication",
    endpoints: [
      { method: "POST", name: "Login", url: "/api/auth/login" },
      { method: "POST", name: "Refresh Token", url: "/api/auth/token" }
    ]
  },
  {
    title: "Customers",
    endpoints: [
      { method: "GET", name: "Get Customers", url: "/api/customers?pageSize=100&page=0" }
    ]
  },
  {
    title: "Devices",
    endpoints: [
      { method: "GET", name: "List Devices", url: "/api/customer/{customerId}/devices" },
      { method: "GET", name: "Device Timeseries", url: "/api/plugins/telemetry/DEVICE/{deviceId}/values/timeseries" }
    ]
  }
];

const app = document.getElementById("app");

function render(filter = "") {
  app.innerHTML = "";

  data.forEach(section => {
    const filteredEndpoints = section.endpoints.filter(e =>
      (e.name + e.url).toLowerCase().includes(filter.toLowerCase())
    );

    if (!filteredEndpoints.length) return;

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";
    header.textContent = section.title;

    const content = document.createElement("div");
    content.className = "section-content";

    header.onclick = () => {
      content.style.display = content.style.display === "block" ? "none" : "block";
    };

    filteredEndpoints.forEach(e => {
      const ep = document.createElement("div");
      ep.className = "endpoint";

      ep.innerHTML = `
        <span class="method ${e.method}">${e.method}</span>
        <span>${e.name}</span>
        <span class="url">${e.url}</span>
        <button class="copy-btn">Copy</button>
      `;

      ep.querySelector(".copy-btn").onclick = () => {
        navigator.clipboard.writeText(e.url);
      };

      content.appendChild(ep);
    });

    sectionEl.appendChild(header);
    sectionEl.appendChild(content);
    app.appendChild(sectionEl);
  });
}

render();

document.getElementById("search").addEventListener("input", e => {
  render(e.target.value);
});
</script>

</body>
</html>
